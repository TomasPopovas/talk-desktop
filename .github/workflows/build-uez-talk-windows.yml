# =============================================================================
# РЎР±РѕСЂРєР° UEZ Talk (Р±СЂРµРЅРґРёСЂРѕРІР°РЅРЅС‹Р№ Nextcloud Talk Desktop) РїРѕРґ Windows 11 x64.
#
# РљСѓРґР° РїРѕР»РѕР¶РёС‚СЊ: .github/workflows/build-uez-talk-windows.yml РІ С„РѕСЂРєРµ talk-desktop
# РўСЂРµР±СѓРµС‚: РєР°С‚Р°Р»РѕРі branding/ РІ РєРѕСЂРЅРµ С„РѕСЂРєР° (СЃРѕРґРµСЂР¶РёРјРѕРµ uez-talk-branding.zip)
#
# РђСЂС‚РµС„Р°РєС‚С‹:
#   UEZ-Talk-installer-exe вЂ” Squirrel-СѓСЃС‚Р°РЅРѕРІС‰РёРє, СЃС‚Р°РІРёС‚СЃСЏ Р’ РџР РћР¤РР›Р¬ РџРћР›Р¬Р—РћР’РђРўР•Р›РЇ
#                            (%LocalAppData%\UEZTalk), РїСЂР°РІР° Р°РґРјРёРЅРёСЃС‚СЂР°С‚РѕСЂР° РЅРµ РЅСѓР¶РЅС‹
#   UEZ-Talk-installer-msi вЂ” WiX MSI, РјР°С€РёРЅРЅР°СЏ СѓСЃС‚Р°РЅРѕРІРєР° (GPO/SCCM)
#   UEZ-Talk-portable      вЂ” РїР°РїРєР° СЃ РіРѕС‚РѕРІРѕР№ РїСЂРѕРіСЂР°РјРјРѕР№ (Р·Р°РїСѓСЃРє Р±РµР· СѓСЃС‚Р°РЅРѕРІРєРё)
# =============================================================================
name: Build UEZ Talk (Windows x64)

on:
  workflow_dispatch:
    inputs:
      spreed_ref:
        description: 'Р’РµС‚РєР°/С‚РµРі nextcloud/spreed (РІСЃС‚СЂРѕРµРЅРЅС‹Р№ Talk)'
        default: 'stable34'
        required: true
  push:
    tags:
      - 'uez-v*'

concurrency:
  group: build-uez-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout talk-desktop (С„РѕСЂРє СЃ branding/)
        uses: actions/checkout@v4

      - name: Checkout nextcloud/spreed
        uses: actions/checkout@v4
        with:
          repository: nextcloud/spreed
          ref: ${{ inputs.spreed_ref || 'stable34' }}
          path: spreed

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            spreed/package-lock.json

      - name: Install WiX Toolset 3.14 (РґР»СЏ MSI)
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe")) { choco install wixtoolset -y --no-progress }
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: РџСЂРёРјРµРЅРёС‚СЊ Р±СЂРµРЅРґРёСЂРѕРІР°РЅРёРµ РЈР­Р—
        shell: bash
        run: bash branding/brand-talk-desktop.sh .

      - name: npm ci (talk-desktop)
        run: npm ci

      - name: npm ci (spreed)
        run: npm ci --prefix=spreed

      - name: РЎР±РѕСЂРєР° РїСЂРёР»РѕР¶РµРЅРёСЏ (portable-РїР°РїРєР°)
        run: npm run build:windows:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: РЎР±РѕСЂРєР° СѓСЃС‚Р°РЅРѕРІС‰РёРєРѕРІ (Squirrel .exe + WiX .msi)
        run: npm run package:windows:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: РЈРїР°РєРѕРІР°С‚СЊ portable-РїР°РїРєСѓ
        shell: pwsh
        run: |
          $dir = Get-ChildItem out -Directory | Where-Object { $_.Name -like '*win32-x64*' } | Select-Object -First 1
          Compress-Archive -Path $dir.FullName -DestinationPath "out\UEZ.Talk-portable-windows-x64.zip"

      - name: РђСЂС‚РµС„Р°РєС‚ вЂ” СѓСЃС‚Р°РЅРѕРІС‰РёРє РІ РїСЂРѕС„РёР»СЊ РїРѕР»СЊР·РѕРІР°С‚РµР»СЏ (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: UEZ-Talk-installer-exe
          path: out/make/**/*.exe
          if-no-files-found: error

      - name: РђСЂС‚РµС„Р°РєС‚ вЂ” MSI РґР»СЏ СЂР°Р·РІС‘СЂС‚С‹РІР°РЅРёСЏ (GPO/SCCM)
        uses: actions/upload-artifact@v4
        with:
          name: UEZ-Talk-installer-msi
          path: out/make/**/*.msi
          if-no-files-found: warn

      - name: РђСЂС‚РµС„Р°РєС‚ вЂ” portable-РїР°РїРєР°
        uses: actions/upload-artifact@v4
        with:
          name: UEZ-Talk-portable
          path: out/UEZ.Talk-portable-windows-x64.zip
          if-no-files-found: error
