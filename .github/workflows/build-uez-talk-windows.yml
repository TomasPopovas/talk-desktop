name: Build UEZ Talk (Windows x64)

on:
  workflow_dispatch:
    inputs:
      spreed_ref:
        description: 'Ветка/тег nextcloud/spreed (встроенный Talk)'
        default: 'stable34'
        required: true
  push:
    tags:
      - 'uez-v*'

concurrency:
  group: build-uez-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      TALK_PATH: ${{ github.workspace }}\spreed
      CHANNEL: stable

    steps:
      - name: Checkout talk-desktop
        uses: actions/checkout@v4

      - name: Checkout nextcloud/spreed
        uses: actions/checkout@v4
        with:
          repository: nextcloud/spreed
          ref: ${{ inputs.spreed_ref || 'stable34' }}
          path: spreed

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            spreed/package-lock.json

      - name: Install WiX Toolset 3.14 (msi)
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe')) {
            choco install wixtoolset -y --no-progress
          }
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Apply UEZ branding
        shell: bash
        run: bash branding/brand-talk-desktop.sh .

      - name: npm ci (talk-desktop)
        run: npm ci

      - name: npm ci (spreed)
        run: npm ci --prefix=spreed

      - name: Build app (portable)
        run: npm run build:windows:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Make installers (Squirrel exe + WiX msi)
        run: npm run package:windows:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Zip portable folder
        shell: pwsh
        run: |
          $dir = Get-ChildItem out -Directory | Where-Object { $_.Name -like '*win32-x64*' } | Select-Object -First 1
          Compress-Archive -Path $dir.FullName -DestinationPath "out\UEZ.Talk-portable-windows-x64.zip"

      - name: Upload installer exe (per-user)
        uses: actions/upload-artifact@v4
        with:
          name: UEZ-Talk-installer-exe
          path: out/make/**/*.exe
          if-no-files-found: error

      - name: Upload installer msi (GPO/SCCM)
        uses: actions/upload-artifact@v4
        with:
          name: UEZ-Talk-installer-msi
          path: out/make/**/*.msi
          if-no-files-found: warn

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: UEZ-Talk-portable
          path: out/UEZ.Talk-portable-windows-x64.zip
          if-no-files-found: error
