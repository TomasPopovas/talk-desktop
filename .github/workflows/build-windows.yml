# .github/workflows/build-windows.yml
#
# Сборка Nextcloud Talk Desktop (с поддержкой нескольких аккаунтов) под Windows x64
# в чистом окружении GitHub Actions.
#
# ВАЖНО ПРО СБОРКУ:
# Упаковка и создание установщика выполняются ОДНОЙ командой `electron-forge make`
# (без --skip-package). Forge сам сначала упаковывает приложение в
# `out\Nextcloud Talk-win32-x64`, а затем делает из него установщик Squirrel в
# `out\make\...`. Прежняя схема из двух шагов (build:windows:x64 + make --skip-package)
# падала с "Couldn't find packaged app", если упакованный вывод не доживал до make.
#
# КАК ИСПОЛЬЗОВАТЬ:
# 1. Запушь свой talk-desktop с применённым multi-account патчем.
# 2. Положи этот файл в .github/workflows/build-windows.yml и запушь.
# 3. Actions -> "Build Windows x64" -> Run workflow.
# 4. Скачай артефакты:
#       - talk-desktop-win32-x64-portable   -> распакованное приложение (Nextcloud Talk.exe)
#       - talk-desktop-win32-x64-installer   -> установщик *Setup.exe (Squirrel)
#
# spreed_ref: ветка/тег Nextcloud Talk (spreed). Строго > 22.0.0-beta.1.
# Желательно под мажорную версию Talk на твоём сервере (stable30 и т.п.).

name: Build Windows x64

on:
  workflow_dispatch:
    inputs:
      spreed_ref:
        description: "Ветка/тег spreed (Nextcloud Talk). Должна быть > 22.0.0-beta.1"
        required: true
        default: "master"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout talk-desktop (твой форк с multi-account)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # package.json требует node ^24.0.0 и npm ^11.3.0.
          node-version: 24
          cache: npm

      - name: Install talk-desktop deps
        run: npm ci

      - name: Clone Nextcloud Talk (spreed) sources
        run: git clone --depth 1 --branch ${{ github.event.inputs.spreed_ref }} https://github.com/nextcloud/spreed spreed

      - name: Install spreed deps
        run: npm ci --prefix=spreed

      # Один шаг: package + make. Forge упакует приложение и соберёт установщик Squirrel.
      - name: Build app and Squirrel installer (x64)
        env:
          TALK_PATH: ${{ github.workspace }}\spreed
        run: npx electron-forge make --platform=win32 --arch=x64 --targets=squirrel

      # Диагностика: покажем, что реально лежит в out\ (помогает, если что-то пойдёт не так)
      - name: List build output
        if: always()
        run: |
          echo "==== out ===="
          if (Test-Path out) { Get-ChildItem out } else { echo "out does not exist" }
          echo "==== out\make ===="
          if (Test-Path out\make) { Get-ChildItem -Recurse out\make } else { echo "out\make does not exist" }

      - name: Upload portable app (распакованное приложение)
        uses: actions/upload-artifact@v4
        with:
          name: talk-desktop-win32-x64-portable
          path: out/Nextcloud Talk-win32-x64/**
          if-no-files-found: error

      - name: Upload installer (Setup.exe)
        uses: actions/upload-artifact@v4
        with:
          name: talk-desktop-win32-x64-installer
          path: out/make/**
          if-no-files-found: error
